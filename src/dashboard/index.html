<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARK - AI Agent Interface</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1117;
  --surface: #1a1d24;
  --surface-light: #252932;
  --border: #2d313a;
  --cyan: #00d4ff;
  --cyan-dim: rgba(0,212,255,0.15);
  --green: #10b981;
  --red: #ef4444;
  --orange: #f59e0b;
  --purple: #8b5cf6;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-dark: #64748b;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

.app {
  display: grid;
  grid-template-columns: 320px 1fr 360px;
  height: 100vh;
  gap: 1px;
  background: var(--border);
}

/* Left Panel */
.left-panel {
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.panel-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-light);
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.panel-header h2 {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--cyan);
}

/* Profile Section - Bottom Left */
.profile-section {
  margin-top: auto;
  padding: 16px;
  border-top: 1px solid var(--border);
  background: var(--surface-light);
  cursor: pointer;
  transition: all 0.2s;
}

.profile-section:hover {
  background: var(--border);
}

.profile-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.profile-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--cyan-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--cyan);
}

.profile-info {
  flex: 1;
}

.profile-name {
  font-size: 14px;
  font-weight: 600;
}

.profile-email {
  font-size: 11px;
  color: var(--text-dim);
}

.profile-menu {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.profile-menu.show {
  display: block;
}

.menu-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}

.menu-item:hover {
  background: var(--border);
}

.menu-item.active {
  background: var(--cyan-dim);
  color: var(--cyan);
}

/* Stats */
.stats-widget {
  padding: 20px;
  border-bottom: 1px solid var(--border);
}

.stat-item { margin-bottom: 24px; }
.stat-label {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}
.stat-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.stat-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.stat-fill.cpu { background: var(--cyan); }
.stat-fill.ram { background: var(--purple); }
.stat-fill.disk { background: var(--green); }
.stat-value {
  font-size: 28px;
  font-weight: 700;
  margin-top: 8px;
  font-family: monospace;
}

/* Agents */
.agents-widget { padding: 16px; }
.agent-card {
  background: var(--surface-light);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
.agent-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.agent-name { font-size: 14px; font-weight: 700; }
.agent-name.morgan { color: var(--cyan); }
.agent-name.peter { color: var(--purple); }
.agent-name.harley { color: var(--orange); }
.agent-name.ultron { color: var(--red); }
.status-badge {
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 20px;
  font-weight: 500;
}
.status-idle { background: var(--border); color: var(--text-dim); }
.status-active { background: rgba(16,185,129,0.15); color: var(--green); }
.agent-stats {
  display: flex;
  justify-content: space-between;
  margin: 12px 0;
  padding: 8px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.stat { text-align: center; flex: 1; }
.stat .value { font-size: 16px; font-weight: 700; }
.stat .label { font-size: 9px; color: var(--text-dark); margin-top: 2px; }
.kids-list {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.kid {
  font-size: 9px;
  padding: 2px 8px;
  background: var(--bg);
  border-radius: 4px;
  color: var(--text-dim);
}

/* Chat */
.center-panel {
  background: var(--surface);
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.chat-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.chat-header h1 { font-size: 18px; font-weight: 700; }
.chat-header h1 span { color: var(--cyan); }
.mute-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.mute-btn.muted { background: var(--red); border-color: var(--red); color: white; }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.message {
  display: flex;
  gap: 12px;
  max-width: 95%;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.assistant { align-self: flex-start; }
.message-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  flex-shrink: 0;
}
.message.user .message-avatar { background: var(--cyan-dim); color: var(--cyan); }
.message.assistant .message-avatar {
  background: var(--surface-light);
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.message-content {
  background: var(--surface-light);
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
  white-space: pre-wrap;
  border: 1px solid var(--border);
  max-width: 100%;
}
.message.user .message-content { background: var(--cyan-dim); border-color: var(--cyan-dim); }
.typing-indicator .message-content { padding: 12px 16px; }
.typing { display: flex; gap: 4px; align-items: center; }
.typing span {
  width: 6px;
  height: 6px;
  background: var(--text-dim);
  border-radius: 50%;
  animation: typing 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-8px); }
}
.chat-input-area {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface-light);
  display: flex;
  gap: 12px;
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  resize: none;
}
.chat-input:focus { border-color: var(--cyan); }
.send-btn {
  background: var(--cyan);
  border: none;
  border-radius: 12px;
  padding: 0 24px;
  color: var(--bg);
  font-weight: 600;
  cursor: pointer;
}
.voice-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0 16px;
  color: var(--text);
  cursor: pointer;
  font-size: 18px;
}
.voice-btn.listening { background: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

/* Task Log */
.right-panel {
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.task-header-actions {
  display: flex;
  gap: 8px;
}
.icon-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
}
.icon-btn:hover {
  background: var(--cyan-dim);
  color: var(--cyan);
  border-color: var(--cyan);
}
.task-list {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.task-item {
  background: var(--surface-light);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
  border-left: 3px solid var(--cyan);
  cursor: pointer;
}
.task-item:hover { background: var(--border); }
.task-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}
.task-type {
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
  text-transform: uppercase;
}
.task-type.knowledge { background: var(--purple); color: white; }
.task-type.action { background: var(--orange); color: white; }
.task-type.conversation { background: var(--border); color: var(--text-dim); }
.task-time { font-size: 10px; color: var(--text-dark); }
.task-query {
  font-size: 12px;
  font-weight: 500;
  margin-bottom: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.task-footer {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
}
.task-status.success { color: var(--green); }
.task-status.error { color: var(--red); }
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dark);
  font-size: 13px;
}

/* Modals */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.8);
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal-content {
  background: var(--surface);
  border-radius: 16px;
  max-width: 600px;
  width: 90%;
  max-height: 80%;
  overflow: hidden;
  border: 1px solid var(--border);
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  background: var(--surface-light);
}
.modal-body {
  padding: 20px;
  overflow-y: auto;
  max-height: 60vh;
  font-size: 14px;
  line-height: 1.6;
}
.modal-close { cursor: pointer; font-size: 24px; color: var(--text-dim); }

/* Memory List */
.memory-item {
  background: var(--surface-light);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.memory-key {
  font-weight: 600;
  color: var(--cyan);
  margin-bottom: 4px;
}
.memory-value {
  font-size: 13px;
  color: var(--text-dim);
}
.delete-memory {
  float: right;
  background: none;
  border: none;
  color: var(--red);
  cursor: pointer;
  font-size: 12px;
}

/* Profile Form */
.profile-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-group label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.form-group input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
}
.form-group input:focus {
  outline: none;
  border-color: var(--cyan);
}
.save-btn {
  background: var(--cyan);
  border: none;
  border-radius: 8px;
  padding: 12px;
  color: var(--bg);
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--border); }
::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="panel-header">
      <h2>⚡ SYSTEM MONITOR</h2>
    </div>
    <div class="stats-widget" id="statsWidget">
      <!-- Stats will be populated via JS -->
    </div>
    <div class="panel-header">
      <h2>🤖 DAUGHTER AGENTS</h2>
    </div>
    <div class="agents-widget" id="agentsWidget"></div>

    <!-- Profile Section - Bottom -->
    <div class="profile-section" id="profileSection">
      <div class="profile-header" id="profileHeader">
        <div class="profile-avatar" id="profileAvatar">👤</div>
        <div class="profile-info">
          <div class="profile-name" id="profileName">User</div>
          <div class="profile-email" id="profileEmail">Set up profile</div>
        </div>
        <div style="color: var(--text-dim);">▼</div>
      </div>
      <div class="profile-menu" id="profileMenu">
        <div class="menu-item" data-action="profile">
          <span>👤</span> My Profile
        </div>
        <div class="menu-item" data-action="memory">
          <span>🧠</span> Memory (Saved Facts)
        </div>
        <div class="menu-item" data-action="tasks">
          <span>📋</span> Previous Tasks
        </div>
      </div>
    </div>
  </div>

  <!-- CENTER PANEL - CHAT -->
  <div class="center-panel">
    <div class="chat-header">
      <h1>STARK <span>AI Agent</span></h1>
      <button class="mute-btn" id="muteBtn">🔊 Voice ON</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message assistant">
        <div class="message-avatar">⚡</div>
        <div class="message-content">Hello, I'm STARK. How can I help you today?</div>
      </div>
    </div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" placeholder="Type your message..." rows="1"></textarea>
      <button class="voice-btn" id="voiceBtn">🎤</button>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>

  <!-- RIGHT PANEL - TASK LOG -->
  <div class="right-panel">
    <div class="panel-header">
      <h2>📋 TASK LOG</h2>
      <div class="task-header-actions">
        <button class="icon-btn" id="viewAllTasksBtn" title="View All Tasks">📋 All</button>
        <button class="icon-btn" id="clearTasksBtn" title="Clear Tasks">🗑️ Clear</button>
      </div>
    </div>
    <div class="task-list" id="taskList"></div>
  </div>
</div>

<!-- Modal Container -->
<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <strong id="modalTitle">Modal Title</strong>
      <span class="modal-close" onclick="closeModal()">&times;</span>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ============================================
// STARK Dashboard - Complete Feature Set
// ============================================

// State
let voiceEnabled = true;
let socket = null;
let currentUtterance = null;
let isListening = false;
let recognition = null;
let userProfile = {
  name: "User",
  email: "",
  phone: "",
  instagram: ""
};

// DOM Elements
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const voiceBtn = document.getElementById('voiceBtn');
const muteBtn = document.getElementById('muteBtn');
const taskList = document.getElementById('taskList');
const agentsWidget = document.getElementById('agentsWidget');
const statsWidget = document.getElementById('statsWidget');
const profileSection = document.getElementById('profileSection');
const profileMenu = document.getElementById('profileMenu');
const profileHeader = document.getElementById('profileHeader');
const profileName = document.getElementById('profileName');
const profileEmail = document.getElementById('profileEmail');
const profileAvatar = document.getElementById('profileAvatar');

// Load saved profile
function loadProfile() {
  const saved = localStorage.getItem('stark_user_profile');
  if (saved) {
    userProfile = JSON.parse(saved);
    profileName.textContent = userProfile.name;
    profileEmail.textContent = userProfile.email || "No email set";
    profileAvatar.textContent = userProfile.name.charAt(0).toUpperCase();
  }
}

function saveProfile() {
  localStorage.setItem('stark_user_profile', JSON.stringify(userProfile));
  profileName.textContent = userProfile.name;
  profileEmail.textContent = userProfile.email || "No email set";
  profileAvatar.textContent = userProfile.name.charAt(0).toUpperCase();
}

// Profile menu toggle
profileHeader.addEventListener('click', (e) => {
  e.stopPropagation();
  profileMenu.classList.toggle('show');
});

document.addEventListener('click', () => {
  profileMenu.classList.remove('show');
});

profileMenu.addEventListener('click', (e) => {
  e.stopPropagation();
  const action = e.target.closest('.menu-item')?.dataset.action;
  if (action === 'profile') {
    showProfileModal();
  } else if (action === 'memory') {
    showMemoryModal();
  } else if (action === 'tasks') {
    showAllTasksModal();
  }
  profileMenu.classList.remove('show');
});

// Profile Modal
function showProfileModal() {
  document.getElementById('modalTitle').textContent = '👤 My Profile';
  document.getElementById('modalBody').innerHTML = `
    <div class="profile-form">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="profileNameInput" value="${userProfile.name}" placeholder="Enter your name">
      </div>
      <div class="form-group">
        <label>Email / Gmail</label>
        <input type="email" id="profileEmailInput" value="${userProfile.email}" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="profilePhoneInput" value="${userProfile.phone}" placeholder="+1234567890">
      </div>
      <div class="form-group">
        <label>Instagram</label>
        <input type="text" id="profileIgInput" value="${userProfile.instagram}" placeholder="@username">
      </div>
      <button class="save-btn" onclick="saveProfileModal()">Save Changes</button>
    </div>
  `;
  document.getElementById('modal').style.display = 'flex';
}

function saveProfileModal() {
  userProfile.name = document.getElementById('profileNameInput')?.value || userProfile.name;
  userProfile.email = document.getElementById('profileEmailInput')?.value || '';
  userProfile.phone = document.getElementById('profilePhoneInput')?.value || '';
  userProfile.instagram = document.getElementById('profileIgInput')?.value || '';
  saveProfile();
  closeModal();
  showToast('Profile saved successfully!');
}

// Memory Modal - Show saved facts
async function showMemoryModal() {
  try {
    const response = await fetch('/api/memory');
    const memories = await response.json();
    
    if (Object.keys(memories).length === 0) {
      document.getElementById('modalBody').innerHTML = '<div class="empty-state">No memories saved yet. Talk to STARK and he will remember things about you.</div>';
    } else {
      document.getElementById('modalBody').innerHTML = `
        <div style="margin-bottom: 12px; font-size: 12px; color: var(--text-dim);">
          Things STARK remembers about you:
        </div>
        ${Object.entries(memories).map(([key, value]) => `
          <div class="memory-item">
            <button class="delete-memory" onclick="deleteMemory('${key}')">🗑️</button>
            <div class="memory-key">${key}</div>
            <div class="memory-value">${value}</div>
          </div>
        `).join('')}
        <button class="save-btn" onclick="clearAllMemories()" style="background: var(--red); margin-top: 12px;">Clear All Memories</button>
      `;
    }
    document.getElementById('modalTitle').textContent = '🧠 STARK\'s Memory';
    document.getElementById('modal').style.display = 'flex';
  } catch (e) {
    document.getElementById('modalBody').innerHTML = '<div class="empty-state">Could not load memories</div>';
  }
}

async function deleteMemory(key) {
  await fetch('/api/memory/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key })
  });
  showMemoryModal();
}

async function clearAllMemories() {
  if (confirm('Clear all memories? STARK will forget everything about you.')) {
    await fetch('/api/memory/clear', { method: 'POST' });
    showMemoryModal();
    showToast('All memories cleared');
  }
}

// All Tasks Modal
async function showAllTasksModal() {
  const response = await fetch('/api/tasks');
  const tasks = await response.json();
  
  if (tasks.length === 0) {
    document.getElementById('modalBody').innerHTML = '<div class="empty-state">No tasks yet. Send a command to STARK.</div>';
  } else {
    document.getElementById('modalBody').innerHTML = `
      <div style="margin-bottom: 12px; font-size: 12px; color: var(--text-dim);">
        Total ${tasks.length} tasks recorded
      </div>
      ${tasks.map(task => `
        <div class="task-item" style="cursor: pointer;" onclick='showTaskDetail(${JSON.stringify(task).replace(/'/g, "&#39;")})'>
          <div class="task-header">
            <span class="task-type ${task.type}">${task.type || 'unknown'}</span>
            <span class="task-time">${new Date(task.time || task.timestamp).toLocaleString()}</span>
          </div>
          <div class="task-query">${escapeHtml((task.query || task.intent || '').substring(0, 80))}</div>
          <div class="task-footer">
            <span>${task.assigned_to || 'STARK'}</span>
            <span class="task-status ${task.status}">${task.status === 'success' ? '✓ Success' : '✗ Error'}</span>
          </div>
        </div>
      `).join('')}
    `;
  }
  document.getElementById('modalTitle').textContent = '📋 All Task History';
  document.getElementById('modal').style.display = 'flex';
}

function showTaskDetail(task) {
  document.getElementById('modalBody').innerHTML = `
    <strong>Query:</strong><br>${escapeHtml(task.query || task.intent)}<br><br>
    <strong>Response:</strong><br>${escapeHtml(task.full_text || task.summary || 'No response')}<br><br>
    <strong>Agent:</strong> ${task.assigned_to || 'STARK'}<br>
    <strong>Status:</strong> ${task.status}<br>
    <strong>Time:</strong> ${new Date(task.time || task.timestamp).toLocaleString()}
  `;
  document.getElementById('modalTitle').textContent = 'Task Details';
  document.getElementById('modal').style.display = 'flex';
}

function showToast(message) {
  const toast = document.createElement('div');
  toast.style.position = 'fixed';
  toast.style.bottom = '20px';
  toast.style.right = '20px';
  toast.style.background = 'var(--surface-light)';
  toast.style.border = '1px solid var(--cyan)';
  toast.style.color = 'var(--cyan)';
  toast.style.padding = '12px 20px';
  toast.style.borderRadius = '8px';
  toast.style.zIndex = '2000';
  toast.style.fontSize = '13px';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// Core Functions
function scrollToBottom() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function speakText(text) {
  if (!voiceEnabled) return;
  if (!text || text.length === 0) return;
  if (currentUtterance) window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.9;
  utterance.pitch = 1.0;
  currentUtterance = utterance;
  window.speechSynthesis.speak(utterance);
}

function toggleMute() {
  voiceEnabled = !voiceEnabled;
  muteBtn.innerHTML = voiceEnabled ? '🔊 Voice ON' : '🔇 Voice OFF';
  muteBtn.classList.toggle('muted', !voiceEnabled);
  if (!voiceEnabled && currentUtterance) window.speechSynthesis.cancel();
}
muteBtn.addEventListener('click', toggleMute);

function initVoiceRecognition() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    voiceBtn.style.opacity = '0.5';
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onresult = (event) => {
    chatInput.value = event.results[0][0].transcript;
    sendMessage();
    stopListening();
  };
  recognition.onerror = () => stopListening();
  recognition.onend = () => stopListening();
}

function startListening() {
  if (!recognition) return;
  try { recognition.start(); isListening = true; voiceBtn.classList.add('listening'); voiceBtn.textContent = '🔴'; } catch(e) {}
}
function stopListening() {
  if (recognition) try { recognition.stop(); } catch(e) {}
  isListening = false; voiceBtn.classList.remove('listening'); voiceBtn.textContent = '🎤';
}
voiceBtn.addEventListener('click', () => isListening ? stopListening() : startListening());

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function addMessage(text, isUser = false) {
  const div = document.createElement('div');
  div.className = `message ${isUser ? 'user' : 'assistant'}`;
  div.innerHTML = `<div class="message-avatar">${isUser ? '👤' : '⚡'}</div><div class="message-content">${escapeHtml(text)}</div>`;
  chatMessages.appendChild(div);
  scrollToBottom();
  return div;
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'message assistant typing-indicator';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="message-avatar">⚡</div><div class="typing"><span></span><span></span><span></span></div>`;
  chatMessages.appendChild(div);
  scrollToBottom();
}
function removeTypingIndicator() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }

async function sendMessage() {
  const message = chatInput.value.trim();
  if (!message) return;
  chatInput.value = '';
  addMessage(message, true);
  addTypingIndicator();
  try {
    const response = await fetch('/api/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: message })
    });
    const data = await response.json();
    removeTypingIndicator();
    if (data.ok && data.task) {
      const reply = data.task.full_text || data.task.summary || "I'm here to help.";
      addMessage(reply, false);
      speakText(reply);
    } else {
      addMessage("Sorry, I encountered an error.", false);
    }
  } catch (error) {
    removeTypingIndicator();
    addMessage("Network error. Is STARK running?", false);
  }
}
sendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

chatInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

async function clearTasks() {
  if (confirm('Clear all task history? This cannot be undone.')) {
    await fetch('/api/clear_tasks', { method: 'POST' });
    renderTasks([]);
    showToast('Tasks cleared');
  }
}
document.getElementById('clearTasksBtn').addEventListener('click', clearTasks);
document.getElementById('viewAllTasksBtn').addEventListener('click', showAllTasksModal);

function formatTime(iso) { try { return new Date(iso).toLocaleTimeString(); } catch { return '--:--:--'; } }

function renderTasks(tasksList) {
  if (!tasksList || tasksList.length === 0) {
    taskList.innerHTML = '<div class="empty-state">No tasks yet. Send a command.</div>';
    return;
  }
  taskList.innerHTML = tasksList.slice(0, 30).map(task => `
    <div class="task-item" onclick='showTaskDetail(${JSON.stringify(task).replace(/'/g, "&#39;")})'>
      <div class="task-header"><span class="task-type ${task.type}">${task.type || 'unknown'}</span><span class="task-time">${formatTime(task.time || task.timestamp)}</span></div>
      <div class="task-query">${escapeHtml((task.query || task.intent || '...').substring(0, 60))}</div>
      <div class="task-footer"><span>${task.assigned_to || 'STARK'}</span><span class="task-status ${task.status}">${task.status === 'success' ? '✓ Success' : '✗ Error'}</span></div>
    </div>
  `).join('');
}

function renderAgents(agentsData) {
  if (!agentsData || Object.keys(agentsData).length === 0) {
    agentsWidget.innerHTML = '<div class="empty-state">Loading agents...</div>';
    return;
  }
  agentsWidget.innerHTML = Object.values(agentsData).map(agent => `
    <div class="agent-card">
      <div class="agent-header"><span class="agent-name ${agent.name.toLowerCase()}">${agent.name}</span><span class="status-badge status-${agent.status || 'idle'}">${agent.status || 'idle'}</span></div>
      <div class="agent-stats">
        <div class="stat"><div class="value">${agent.success_rate || 0}%</div><div class="label">Success</div></div>
        <div class="stat"><div class="value">${agent.avg_response_ms || 0}ms</div><div class="label">Avg Resp</div></div>
        <div class="stat"><div class="value">${agent.tasks_completed || 0}</div><div class="label">Tasks</div></div>
      </div>
      <div class="kids-list">${(agent.kids || []).map(kid => `<span class="kid">${kid}</span>`).join('')}</div>
    </div>
  `).join('');
}

function updateStats(data) {
  statsWidget.innerHTML = `
    <div class="stat-item">
      <div class="stat-label">CPU <span>${data.cpu}%</span></div>
      <div class="stat-bar"><div class="stat-fill cpu" style="width:${data.cpu}%"></div></div>
      <div class="stat-value">${data.cpu}%</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">RAM <span>${data.ram_percent}%</span></div>
      <div class="stat-bar"><div class="stat-fill ram" style="width:${data.ram_percent}%"></div></div>
      <div class="stat-value">${data.ram_used_gb} GB / ${data.ram_total_gb} GB</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">DISK <span>${data.disk_percent}%</span></div>
      <div class="stat-bar"><div class="stat-fill disk" style="width:${data.disk_percent}%"></div></div>
      <div class="stat-value">${data.disk_used_gb} GB / ${data.disk_total_gb} GB</div>
    </div>
  `;
}

function initSocket() {
  socket = io({ transports: ['websocket', 'polling'], reconnection: true });
  socket.on('connect', () => {
    fetch('/api/agents').then(r => r.json()).then(renderAgents);
    fetch('/api/tasks').then(r => r.json()).then(t => renderTasks(t));
    fetch('/api/metrics').then(r => r.json()).then(updateStats);
  });
  socket.on('task_update', () => { fetch('/api/tasks').then(r => r.json()).then(renderTasks); });
  socket.on('agent_update', renderAgents);
  socket.on('system_metrics', updateStats);
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
window.onclick = (e) => { if (e.target === document.getElementById('modal')) closeModal(); };

function init() {
  loadProfile();
  initVoiceRecognition();
  initSocket();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  setTimeout(scrollToBottom, 100);
}
init();
</script>
</body>
</html>
